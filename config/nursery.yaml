world:
  width: 1000.0
  height: 1000.0
  grid_resolution: 5.0
  boundary: toroidal

physics:
  dt: 0.01
  default_drag: 1.0
  contact_repulsion: 2.0

environment:
  nutrient_diffusion_rate: 0.15
  nutrient_source_count: 8
  nutrient_source_strength: 4.0
  nutrient_decay_rate: 0.0005
  detritus_decay_rate: 0.005
  detritus_recycling_rate: 0.08
  light_intensity_max: 1.25
  light_direction: [1.0, 0.0]

energy:
  basal_cost_per_node: 0.0005
  feed_rate: 0.02
  photosynthesis_rate: 0.008
  reproduction_threshold: 60.0

evolution:
  position_mutation_sigma: 0.5
  radius_mutation_sigma: 0.05
  weight_mutation_sigma: 0.1
  bias_mutation_sigma: 0.05
  tau_mutation_sigma: 0.02
  motor_strength_mutation_sigma: 0.2

brain:
  default_input_size: 3
  motor_force_scale: 1.0

creatures:
  min_population: 0
  max_population: 800

simulation:
  initial_seed: 42
